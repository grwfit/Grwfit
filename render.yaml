services:
  - type: web
    name: grwfit-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_PLATFORM_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: RAZORPAY_KEY_ID
        value: placeholder
      - key: RAZORPAY_KEY_SECRET
        value: placeholder
      - key: RAZORPAY_WEBHOOK_SECRET
        value: placeholder
      - key: WHATSAPP_BSP
        value: gupshup
      - key: GUPSHUP_API_KEY
        value: placeholder
      - key: GUPSHUP_APP_NAME
        value: grwfit
      - key: GUPSHUP_SRC_PHONE
        value: placeholder
      - key: STORAGE_BUCKET
        value: grwfit-dev
      - key: AWS_REGION
        value: ap-south-1
      - key: AWS_ACCESS_KEY_ID
        value: placeholder
      - key: AWS_SECRET_ACCESS_KEY
        value: placeholder
      - key: AWS_S3_BUCKET
        value: grwfit-dev
